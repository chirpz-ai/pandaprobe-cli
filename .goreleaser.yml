version: 2

project_name: pandaprobe-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: pandaprobe
    binary: pandaprobe
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/chirpz-ai/pandaprobe-cli/internal/version.Version={{.Version}}
      - -X github.com/chirpz-ai/pandaprobe-cli/internal/version.Commit={{.ShortCommit}}
      - -X github.com/chirpz-ai/pandaprobe-cli/internal/version.Date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: chirpz-ai
    name: pandaprobe-cli
  # Attach the install scripts to every release so they have a stable download
  # URL that the curl/irm one-liners (and the cli.pandaprobe.com vanity host)
  # can point at.
  extra_files:
    - glob: ./scripts/install.sh
    - glob: ./scripts/install.ps1
